services:

  backend:
    build: ./backend
    container_name: clickcity-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DB_HOST=mongo
      - DB_PORT=27017
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: clickcity-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    container_name: clickcity-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: